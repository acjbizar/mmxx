<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>mmxx variable font – letter sample</title>
    <style>
        :root{
            --gap: 1.0;           /* axis value */
            --fontSize: 128px;
            --lineHeight: 1.05;
            --salt: 0;            /* 0/1 toggle */
        }

        @font-face {
            font-family: "mmxx";
            src:
                    url("../dist/fonts/mmxx.woff2") format("woff2"),
                    url("../dist/fonts/mmxx.woff")  format("woff"),
                    url("../dist/fonts/mmxx.ttf")   format("truetype");
            font-style: normal;
            font-weight: 400;
            font-display: swap;
        }

        html, body { height: 100%; }
        body{
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background: #fff;
            color: #111;
        }

        .wrap{
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px;
            display: grid;
            gap: 18px;
        }

        .card{
            border: 1px solid #e6e6e6;
            border-radius: 14px;
            padding: 16px;
            box-shadow: 0 1px 0 rgba(0,0,0,.02);
        }

        .row{
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }

        @media (min-width: 900px){
            .row{
                grid-template-columns: 1fr 1fr;
                align-items: start;
            }
        }

        .controls{
            display: grid;
            gap: 12px;
        }

        .control{
            display: grid;
            grid-template-columns: 120px 1fr 90px;
            gap: 10px;
            align-items: center;
        }

        label{
            font-size: 13px;
            color: #333;
            user-select: none;
        }

        input[type="range"]{ width: 100%; }
        input[type="text"],
        textarea{
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            box-sizing: border-box;
        }

        textarea{
            resize: vertical;
            min-height: 110px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
            line-height: 1.35;
            white-space: pre;
        }

        .btn{
            appearance: none;
            border: 1px solid #ddd;
            background: #fafafa;
            border-radius: 10px;
            padding: 8px 10px;
            cursor: pointer;
            font-size: 13px;
        }
        .btn:hover{ background: #f3f3f3; }

        .meta{
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            font-size: 13px;
            color: #555;
        }

        .pill{
            display: inline-flex;
            gap: 6px;
            align-items: center;
            padding: 4px 10px;
            border: 1px solid #e6e6e6;
            border-radius: 999px;
            background: #fff;
        }
        .dot{
            width: 8px;
            height: 8px;
            border-radius: 999px;
            background: #bbb;
        }
        .dot.ok{ background: #2ecc71; }
        .dot.bad{ background: #e74c3c; }

        .sample{
            font-family: "mmxx", monospace;
            font-size: var(--fontSize);
            line-height: var(--lineHeight);
            letter-spacing: 0;
            /* NOTE: axis tag is "GAP " with a trailing space */
            font-variation-settings: "GAP " var(--gap);

            /* SALT toggle */
            font-variant-alternates: stylistic(salt);
            font-feature-settings: "salt" var(--salt);

            white-space: pre-wrap;
            word-break: break-word;
        }

        .bigLetter{
            font-family: "mmxx", monospace;
            font-variation-settings: "GAP " var(--gap);

            /* SALT toggle */
            font-variant-alternates: stylistic(salt);
            font-feature-settings: "salt" var(--salt);

            font-size: 220px;
            line-height: 1;
            padding: 12px 0;
            text-align: center;
            border: 1px dashed #e9e9e9;
            border-radius: 14px;
            background: repeating-linear-gradient(
                    45deg,
                    rgba(0,0,0,0.015),
                    rgba(0,0,0,0.015) 10px,
                    rgba(0,0,0,0.00) 10px,
                    rgba(0,0,0,0.00) 20px
            );
        }

        .hint{
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        code{
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
            font-size: 12px;
        }

        .cssBox{
            width: 100%;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 12px;
            background: #fcfcfc;
            overflow: auto;
        }

        .toggleRow{
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .toggle{
            display: inline-flex;
            gap: 8px;
            align-items: center;
            padding: 6px 10px;
            border: 1px solid #e6e6e6;
            border-radius: 999px;
            background: #fff;
            user-select: none;
        }
        .toggle input{ transform: translateY(1px); }
    </style>
</head>
<body>
<div class="wrap">
    <h1 style="margin:0;font-size:18px;">mmxx variable font demo</h1>

    <div class="card meta" id="meta">
        <span class="pill"><span class="dot" id="fontDot"></span><span id="fontStatus">Loading font…</span></span>
        <span class="pill"><span class="dot" id="manifestDot"></span><span id="manifestStatus">Manifest…</span></span>
        <span class="pill">Axis <code>"GAP "</code> (Gap): <code id="gapReadout">1.00</code></span>
        <span class="pill">Range: <code>0.50</code> → <code>2.00</code> (default <code>1.00</code>)</span>
        <span class="pill">File: <code>../dist/fonts/mmxx-vf.woff2</code></span>
        <span class="pill">Variant: <code id="saltReadout">salt off</code></span>
    </div>

    <div class="row">
        <div class="card controls">
            <div class="control">
                <label for="gap">Gap</label>
                <input id="gap" type="range" min="0.5" max="2.0" step="0.01" value="1.0" />
                <input id="gapNum" type="text" inputmode="decimal" value="1.00" />
            </div>

            <div class="control">
                <label for="size">Font size</label>
                <input id="size" type="range" min="16" max="260" step="1" value="128" />
                <input id="sizeNum" type="text" inputmode="numeric" value="128" />
            </div>

            <div class="toggleRow">
                <label class="toggle" for="saltToggle" title="Toggle stylistic alternates via 'salt'">
                    <input id="saltToggle" type="checkbox" />
                    <span>SALT variant</span>
                </label>
                <span class="hint" style="margin:0;">(uses <code>font-feature-settings: "salt"</code>)</span>
            </div>

            <div style="display:grid;gap:8px;">
                <label for="text">Sample text</label>
                <!-- textarea so newlines + "all glyphs" defaults work -->
                <textarea id="text" rows="5" spellcheck="false"></textarea>
                <div class="hint">Default glyphs are loaded from <code>../data/manifest.json</code> → <code>unicodeRanges</code>.</div>
            </div>

            <div style="display:flex;gap:10px;flex-wrap:wrap;">
                <button class="btn" id="presetAlphabet">All glyphs</button>
                <button class="btn" id="presetPangram">Pangram (if a–z)</button>
                <button class="btn" id="presetSingle">Single letter</button>
                <button class="btn" id="presetMin">Gap 50%</button>
                <button class="btn" id="presetMax">Gap 200%</button>
                <button class="btn" id="copyCss">Copy CSS snippet</button>
            </div>

            <div class="cssBox" aria-label="css snippet">
                <code id="cssSnippet"></code>
            </div>
        </div>

        <div class="card">
            <div class="bigLetter" id="bigLetter" aria-label="big letter">a</div>
            <div class="sample" id="sample" aria-label="sample text"></div>
        </div>
    </div>
</div>

<script>
    const AXIS_TAG = "GAP ";   // IMPORTANT: trailing space
    const MIN = 0.5, MAX = 2.0;

    // --- MANIFEST
    const MANIFEST_URL = "../data/manifest.json";
    let manifestGlyphs = null; // { all, letters, digits, punct, other, allText }
    let userEditedText = false;

    // --- DOM
    const root = document.documentElement;

    const gap = document.getElementById("gap");
    const gapNum = document.getElementById("gapNum");
    const gapReadout = document.getElementById("gapReadout");

    const size = document.getElementById("size");
    const sizeNum = document.getElementById("sizeNum");

    const saltToggle = document.getElementById("saltToggle");
    const saltReadout = document.getElementById("saltReadout");

    const text = document.getElementById("text");
    const sample = document.getElementById("sample");
    const bigLetter = document.getElementById("bigLetter");

    const fontDot = document.getElementById("fontDot");
    const fontStatus = document.getElementById("fontStatus");

    const manifestDot = document.getElementById("manifestDot");
    const manifestStatus = document.getElementById("manifestStatus");

    const cssSnippet = document.getElementById("cssSnippet");

    // --- helpers
    function clamp(n, lo, hi){
        n = Number(n);
        if (!Number.isFinite(n)) return lo;
        return Math.min(hi, Math.max(lo, n));
    }

    function fmt2(n){
        return (Math.round(n * 100) / 100).toFixed(2);
    }

    function setCSSVars({gapVal, sizeVal, saltVal}){
        root.style.setProperty("--gap", String(gapVal));
        root.style.setProperty("--fontSize", `${sizeVal}px`);
        root.style.setProperty("--salt", String(saltVal ? 1 : 0));

        gapReadout.textContent = fmt2(gapVal);
        saltReadout.textContent = saltVal ? "salt on" : "salt off";

        cssSnippet.textContent =
            `font-family: "mmxx";
font-variation-settings: "${AXIS_TAG}" ${fmt2(gapVal)};
font-feature-settings: "salt" ${saltVal ? 1 : 0};
font-size: ${sizeVal}px;`;
    }

    function pickBigGlyph(t){
        // Only lowercase and digits are supported for the big preview.
        const m = (t ?? "").match(/[a-z0-9]/);
        return m ? m[0] : "a";
    }

    function syncFromUI(){
        const g = clamp(gap.value, MIN, MAX);
        const s = clamp(size.value, 16, 260);
        const saltVal = !!saltToggle.checked;

        gapNum.value = fmt2(g);
        sizeNum.value = String(s);

        setCSSVars({gapVal: g, sizeVal: s, saltVal});

        const t = (text.value ?? "").replace(/\r\n/g, "\n");
        sample.textContent = t;
        bigLetter.textContent = pickBigGlyph(t);
    }

    function syncGapFromText(){
        const v = clamp(gapNum.value, MIN, MAX);
        gapNum.value = fmt2(v);
        gap.value = String(v);
        syncFromUI();
    }

    function syncSizeFromText(){
        const v = clamp(sizeNum.value, 16, 260);
        sizeNum.value = String(v);
        size.value = String(v);
        syncFromUI();
    }

    // --- MANIFEST parsing helpers
    function parseCodepoint(v){
        if (typeof v === "number" && Number.isFinite(v)) return v;
        if (typeof v !== "string") return NaN;
        let t = v.trim().toUpperCase();
        t = t.replace(/^U\+/, "");
        if (t.startsWith("0X")) return parseInt(t, 16);
        if (/^[0-9A-F]+$/.test(t)) return parseInt(t, 16);
        if (/^\d+$/.test(t)) return parseInt(t, 10);
        return NaN;
    }

    function parseUnicodeRangesValue(ur){
        const out = [];
        if (!ur) return out;

        if (Array.isArray(ur)){
            for (const item of ur){
                if (Array.isArray(item) && item.length >= 2){
                    const a = parseCodepoint(item[0]);
                    const b = parseCodepoint(item[1]);
                    if (Number.isFinite(a) && Number.isFinite(b)) out.push([Math.min(a,b), Math.max(a,b)]);
                }
            }
        }
        return out;
    }

    function extractUnicodeRanges(manifest){
        // Your manifest uses top-level unicodeRanges: [[start,end],...]
        const direct = manifest?.unicodeRanges ?? manifest?.metadata?.unicodeRanges;
        const parsed = parseUnicodeRangesValue(direct);
        if (parsed.length) return parsed;

        // Fallback deep-search (safe)
        const visited = new WeakSet();
        const foundValues = [];

        (function walk(node){
            if (!node || typeof node !== "object") return;
            if (visited.has(node)) return;
            visited.add(node);

            if (Object.prototype.hasOwnProperty.call(node, "unicodeRanges")){
                foundValues.push(node.unicodeRanges);
            }
            for (const k of Object.keys(node)) walk(node[k]);
        })(manifest);

        for (const v of foundValues){
            const p = parseUnicodeRangesValue(v);
            if (p.length) return p;
        }
        return [];
    }

    function isPrintableCodepoint(cp){
        if (cp === 0x20) return true;                  // space
        if (cp < 0x20) return false;                   // C0 controls
        if (cp >= 0x7F && cp <= 0x9F) return false;    // C1 controls
        return true;
    }

    function buildGlyphSets(ranges){
        const letters = new Set();
        const digits  = new Set();
        const punct   = new Set();
        const other   = new Set();
        const all     = new Set();

        const asciiPunct = `!"#$%&'()*+,-./:;<=>?@[\\]^_\`{|}~`;

        for (const [start, end] of ranges){
            const a = Math.max(0, start|0);
            const b = Math.min(0x10FFFF, end|0);
            for (let cp = a; cp <= b; cp++){
                if (!isPrintableCodepoint(cp)) continue;

                // exclude Latin uppercase
                if (cp >= 0x41 && cp <= 0x5A) continue;

                const ch = String.fromCodePoint(cp);
                all.add(ch);

                if (cp >= 0x61 && cp <= 0x7A) letters.add(ch);
                else if (cp >= 0x30 && cp <= 0x39) digits.add(ch);
                else if (asciiPunct.includes(ch)) punct.add(ch);
                else other.add(ch);
            }
        }

        const byCp = (x, y) => x.codePointAt(0) - y.codePointAt(0);

        const lettersArr = Array.from(letters).sort(byCp);
        const digitsArr  = Array.from(digits).sort(byCp);
        const punctArr   = Array.from(punct).sort(byCp);
        const otherArr   = Array.from(other).sort(byCp);
        const allArr     = Array.from(all).sort(byCp);

        // Default sample text = ALL available glyphs, grouped for readability.
        // (This will include "#$." from your manifest.)
        const lines = [];
        if (lettersArr.length) lines.push(lettersArr.join(""));
        if (digitsArr.length)  lines.push(digitsArr.join(""));
        if (punctArr.length)   lines.push(punctArr.join(""));
        if (otherArr.length)   lines.push(otherArr.join(""));

        return {
            all: allArr,
            letters: lettersArr,
            digits: digitsArr,
            punct: punctArr,
            other: otherArr,
            allText: lines.join("\n")
        };
    }

    async function loadManifestGlyphs(){
        manifestDot.classList.remove("ok", "bad");
        manifestStatus.textContent = "Manifest…";

        try{
            const res = await fetch(MANIFEST_URL, { cache: "no-store" });
            if (!res.ok) throw new Error(`manifest fetch failed: ${res.status}`);
            const manifest = await res.json();

            const ranges = extractUnicodeRanges(manifest);
            if (!ranges.length){
                manifestDot.classList.add("bad");
                manifestStatus.textContent = "Manifest has no unicodeRanges";
                return null;
            }

            const glyphs = buildGlyphSets(ranges);
            manifestGlyphs = glyphs;

            manifestDot.classList.add("ok");
            manifestStatus.textContent =
                `Manifest loaded (${glyphs.all.length} glyphs; ${glyphs.punct.length} punct)`;

            return glyphs;
        }catch(e){
            manifestDot.classList.add("bad");
            manifestStatus.textContent = "Manifest failed to load";
            return null;
        }
    }

    async function applyDefaultFromManifest(){
        const glyphs = await loadManifestGlyphs();
        if (!glyphs || !glyphs.allText) return;

        // Key change: set defaults from manifest unless the user already typed.
        if (!userEditedText){
            text.value = glyphs.allText;
        }
    }

    // --- events
    gap.addEventListener("input", syncFromUI);
    size.addEventListener("input", syncFromUI);

    gapNum.addEventListener("change", syncGapFromText);
    sizeNum.addEventListener("change", syncSizeFromText);

    text.addEventListener("input", () => {
        userEditedText = true;
        syncFromUI();
    });

    saltToggle.addEventListener("change", syncFromUI);

    document.getElementById("presetAlphabet").addEventListener("click", () => {
        if (manifestGlyphs?.allText){
            text.value = manifestGlyphs.allText;
        } else {
            text.value = "abcdefghijklmnopqrstuvwxyz\n0123456789\n#$.\n";
        }
        userEditedText = true;
        syncFromUI();
    });

    document.getElementById("presetPangram").addEventListener("click", () => {
        const hasFullAZ = manifestGlyphs?.letters?.length === 26
            && manifestGlyphs.letters.join("") === "abcdefghijklmnopqrstuvwxyz";

        if (hasFullAZ){
            text.value = "the quick brown fox jumps over the lazy dog.\nabcdefghijklmnopqrstuvwxyz\n0123456789";
        } else if (manifestGlyphs?.allText){
            text.value = manifestGlyphs.allText;
        } else {
            text.value = "the quick brown fox jumps over the lazy dog.\nabcdefghijklmnopqrstuvwxyz\n0123456789";
        }
        userEditedText = true;
        syncFromUI();
    });

    document.getElementById("presetSingle").addEventListener("click", () => {
        const ch = manifestGlyphs?.letters?.[0] ?? "a";
        text.value = ch;
        userEditedText = true;
        syncFromUI();
    });

    document.getElementById("presetMin").addEventListener("click", () => {
        gap.value = String(MIN);
        syncFromUI();
    });

    document.getElementById("presetMax").addEventListener("click", () => {
        gap.value = String(MAX);
        syncFromUI();
    });

    document.getElementById("copyCss").addEventListener("click", async () => {
        try{
            await navigator.clipboard.writeText(cssSnippet.textContent);
            const old = cssSnippet.textContent;
            cssSnippet.textContent = old + "\n/* copied */";
            setTimeout(() => { cssSnippet.textContent = old; }, 900);
        }catch(e){
            alert("Clipboard copy failed (browser permissions).");
        }
    });

    // --- font load indicator
    (async () => {
        try {
            await document.fonts.ready;
            await document.fonts.load(`24px "mmxx"`, "a");
            fontDot.classList.add("ok");
            fontStatus.textContent = "Font loaded";
        } catch (e) {
            fontDot.classList.add("bad");
            fontStatus.textContent = "Font failed to load (check dist/fonts paths)";
        }
    })();

    // init
    (async () => {
        // show something immediately
        text.value = "Loading glyphs from manifest…";
        await applyDefaultFromManifest();
        syncFromUI();
    })();
</script>
</body>
</html>
